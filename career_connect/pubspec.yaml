name: career_connect
description: CareerConnect — Job & Internship Finder Platform for university students and employers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  shared_preferences: ^2.3.5
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  badges: ^3.1.2
  timeago: ^3.7.0
  readmore: ^3.0.0

  # Image & File
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  file_picker: ^10.1.9
  path_provider: ^2.1.5

  # PDF
  flutter_pdfview: ^1.3.2

  # Misc
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0
  dartz: ^0.10.1
  rxdart: ^0.28.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  flutter_local_notifications: ^21.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
